# Yerel geliştirme için offline fallback.
# Önerilen: Neon free tier — bu dosyayı kullanma.
services:
  postgres:
    image: postgres:16-alpine
    container_name: independentai-postgres
    environment:
      POSTGRES_USER: independentai
      POSTGRES_PASSWORD: independentai
      POSTGRES_DB: independentai
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg-data:
