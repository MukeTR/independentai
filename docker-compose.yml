# Yerel geliştirme için opsiyonel.
# Önerilen: Neon (postgres) + Upstash (redis) free tier — bu dosyayı kullanma.
# Bu dosya sadece offline geliştirme için fallback.
services:
  postgres:
    image: postgres:16-alpine
    container_name: independentai-postgres
    environment:
      POSTGRES_USER: independentai
      POSTGRES_PASSWORD: independentai
      POSTGRES_DB: independentai
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: independentai-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
